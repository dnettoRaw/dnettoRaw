name: Profile Metrics

on:
  schedule:
    - cron: '0 4 * * 1' # Every Monday at 4 AM UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ── Overview Stats ──────────────────────────────────────
      - name: 📊 Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          config_display: large
          filename: generated/overview.svg

      # ── Most Used Languages ─────────────────────────────────
      - name: 💬 Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          filename: generated/languages.svg

      # ── Achievements ────────────────────────────────────────
      # Requires classic PAT with scopes: public_repo, read:user
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          filename: generated/achievements.svg

      # ── Isometric Contribution Calendar ─────────────────────
      - name: 📅 Contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: generated/isocalendar.svg

      # ── Contribution Habits ─────────────────────────────────
      # Requires classic PAT with scopes: public_repo, read:user
      - name: 💡 Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          filename: generated/habits.svg
