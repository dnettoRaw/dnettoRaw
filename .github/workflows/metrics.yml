name: Profile Metrics

on:
  schedule:
    - cron: '0 4 */4 * *' # Every 4 days at 4 AM UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ── Header (Avatar & Info) ──────────────────────────────
      - name: 👤 Header
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: header, metadata
          config_timezone: Europe/Paris
          filename: generated/header.svg

      # ── Stats (Activity & Community) ────────────────────────
      - name: 📊 Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: activity, community, repositories
          config_timezone: Europe/Paris
          config_display: large
          filename: generated/stats.svg

      # ── Most Used Languages ─────────────────────────────────
      - name: 💬 Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, renderedscript
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15
          filename: generated/languages.svg

      # ── Isometric Contribution Calendar ─────────────────────
      - name: 📅 Contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: generated/isocalendar.svg

      # ── Notable Contributions ───────────────────────────────
      - name: 🏆 Notable
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_notable_from: all
          filename: generated/notable.svg

      # ── Recent Activity ─────────────────────────────────────
      - name: 💡 Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: dnettoRaw
          template: classic
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, fork, review, comment, push
          filename: generated/activity.svg
